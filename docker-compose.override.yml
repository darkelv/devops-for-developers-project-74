services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: node
    environment:
      NODE_ENV: development
    volumes:
      - ./app:/app
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run build && npm run dev"

  caddy:
    image: caddy:2
    depends_on:
      - app
    volumes:
      - ./services/caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  caddy_data:
  caddy_config:
